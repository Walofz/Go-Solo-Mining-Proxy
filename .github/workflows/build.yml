name: Build and Push to GHCR

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build Pre-built Binary
      run: |
        if [ ! -f go.mod ]; then
          go mod init go-solo-mining-proxy
        fi
        go mod tidy
        mkdir -p build
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o build/proxy-amd64 *.go
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o build/proxy-arm64 *.go

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Convert repository name to lowercase
      id: lowercase_repo
      run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ env.REPO }}/solo-proxy
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=tag

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
