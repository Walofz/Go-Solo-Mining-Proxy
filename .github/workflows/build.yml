name: Go Build Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build Pre-built Binary
      run: |
        if [ ! -f go.mod ]; then
          go mod init go-solo-mining-proxy
        fi
        go mod tidy
        mkdir -p build
        CGO_ENABLED=0 GOOS=linux go build -o build/proxy *.go

    - name: Build Check (Docker)
      run: docker build -t solo-mining-proxy-test .